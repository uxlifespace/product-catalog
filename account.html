<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marcel&amp;Co — Мій кабінет</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --main:#9C4A2D;--main2:#FFCFA8;--hover:#B33A0B;
  --green:#3F4818;--green2:#D3CA9F;
  --page:#DCEBE7;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--page);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--main);-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}button{font-family:inherit;cursor:pointer}a{color:inherit;text-decoration:none}
.wrap{max-width:900px;margin:0 auto;padding:0 24px}
.hdr{height:80px;display:flex;align-items:center;position:sticky;top:0;z-index:50;background:var(--page);border-bottom:1px solid rgba(0,0,0,.06)}
.hdr__in{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%}
.hdr__back{justify-self:start;display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:500;color:var(--main);opacity:.7;transition:opacity .2s}
.hdr__back:hover{opacity:1}
.hdr__back svg{width:18px;height:18px;flex-shrink:0}
.logo{justify-self:center;display:flex;align-items:center}
.logo img{height:44px;width:auto;display:block}
.hdr__spacer{justify-self:end}

.page-title{font-size:32px;font-weight:700;color:var(--main);margin:40px 0 28px;letter-spacing:-.5px}

/* LOGIN GATE */
#loginGate{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px;gap:20px}
#loginGate p{font-size:16px;color:var(--main);opacity:.75;max-width:360px;line-height:1.5}
#googleBtn{margin-top:8px}

/* PROFILE CARD */
.profile-card{display:flex;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:32px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.profile-card img{width:56px;height:56px;border-radius:50%;object-fit:cover;flex-shrink:0}
.profile-card__info{flex:1;min-width:0}
.profile-card__name{font-size:18px;font-weight:600;color:var(--main)}
.profile-card__email{font-size:14px;color:var(--main);opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{border:none;background:var(--main2);color:var(--main);font-weight:500;font-size:14px;padding:10px 18px;border-radius:10px;transition:background .2s}
.logout-btn:hover{background:var(--hover);color:#fff}

.sec-title{font-size:20px;font-weight:600;color:var(--main);margin:0 0 16px}

/* ORDERS */
.order-card{background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.order-card__hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.order-card__num{font-size:16px;font-weight:600;color:var(--main)}
.order-card__date{font-size:13px;color:var(--main);opacity:.55;margin-left:8px}
.order-card__status{font-size:13px;font-weight:500;padding:5px 12px;border-radius:100px;background:var(--page);color:var(--green)}
.order-card__status.pending{background:#FFF3D6;color:#8A6300}
.order-items{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.oi-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;gap:12px}
.oi-row__name{flex:1;color:var(--main)}
.oi-row__qty{opacity:.55;white-space:nowrap}
.oi-row__price{font-weight:600;white-space:nowrap}
.order-card__total{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid rgba(0,0,0,.06);font-weight:600;font-size:15px;margin-bottom:14px}
.repeat-btn{width:100%;border:none;background:var(--main2);color:var(--main);font-weight:600;font-size:14px;padding:12px;border-radius:10px;transition:background .2s}
.repeat-btn:hover{background:var(--hover);color:#fff}
.repeat-btn:disabled{opacity:.5;cursor:default}

.empty-state{text-align:center;padding:60px 24px;opacity:.6;font-size:15px}
</style>
</head>
<body>
<header class="hdr"><div class="wrap hdr__in">
  <a class="hdr__back" href="/">
    <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    До каталогу
  </a>
  <a class="logo" href="/" aria-label="Marcel&amp;Co">
    <img src="Vector-logo.svg" alt="Marcel&amp;Co" />
  </a>
  <span class="hdr__spacer"></span>
</div></header>

<div class="wrap">
  <h1 class="page-title">Мій кабінет</h1>

  <div id="loginGate" style="display:none">
    <p>Увійдіть через Google, щоб бачити історію своїх замовлень і швидко повторювати покупки.</p>
    <div id="googleBtn"></div>
  </div>

  <div id="accountArea" style="display:none">
    <div class="profile-card">
      <img id="avatarImg" src="" alt="" />
      <div class="profile-card__info">
        <div class="profile-card__name" id="userName"></div>
        <div class="profile-card__email" id="userEmail"></div>
      </div>
      <button class="logout-btn" id="logoutBtn">Вийти</button>
    </div>

    <h2 class="sec-title">Історія замовлень</h2>
    <div id="ordersList"></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// Стан: null = ще не перевіряли, false = гість, об'єкт = залогінений користувач
var currentUser = null;

function showGate() {
  document.getElementById('loginGate').style.display = 'flex';
  document.getElementById('accountArea').style.display = 'none';
}

function showAccount(user, orders) {
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('accountArea').style.display = 'block';
  document.getElementById('avatarImg').src = user.avatar_url || '';
  document.getElementById('userName').textContent = user.name || 'Клієнт Marcel&Co';
  document.getElementById('userEmail').textContent = user.email || '';
  renderOrders(orders || []);
}

function statusLabel(order) {
  if (order.keycrm_order_id) return { text: '✔ Прийнято', cls: '' };
  return { text: '⏳ Обробляється', cls: 'pending' };
}

function formatDate(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch (e) { return ''; }
}

function renderOrders(orders) {
  var container = document.getElementById('ordersList');
  if (!orders.length) {
    container.innerHTML = '<div class="empty-state">У вас ще немає замовлень. Час побалувати улюбленця &#128021;</div>';
    return;
  }

  var total = orders.length;
  var html = orders.map(function (order, idx) {
    var num = total - idx;
    var st = statusLabel(order);
    var items = order.order_items || [];

    var itemsHtml = items.map(function (item) {
      return '<div class="oi-row">'
        + '<span class="oi-row__name">' + (item.product_name || '') + (item.weight ? ' ' + item.weight + 'г' : '') + '</span>'
        + '<span class="oi-row__qty">' + (item.quantity || 1) + ' шт</span>'
        + '<span class="oi-row__price">' + (item.unit_price || 0) + ' ₴</span>'
        + '</div>';
    }).join('');

    return '<div class="order-card">'
      + '<div class="order-card__hdr">'
      + '<span><span class="order-card__num">Замовлення №' + num + '</span><span class="order-card__date">' + formatDate(order.created_at) + '</span></span>'
      + '<span class="order-card__status ' + st.cls + '">' + st.text + '</span>'
      + '</div>'
      + '<div class="order-items">' + itemsHtml + '</div>'
      + '<div class="order-card__total"><span>Разом</span><span>' + (order.total_amount || 0) + ' ₴</span></div>'
      + '<button class="repeat-btn" data-repeat="' + order.id + '">Повторити замовлення</button>'
      + '</div>';
  }).join('');

  container.innerHTML = html;

  container.querySelectorAll('[data-repeat]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var orderId = btn.dataset.repeat;
      var order = orders.find(function (o) { return String(o.id) === String(orderId); });
      if (order) repeatOrder(order);
    });
  });
}

// Додає всі позиції замовлення назад у кошик (об'єднуючи кількість, якщо товар вже там є)
// і переходить на сторінку оформлення. Використовує той самий контракт sessionStorage,
// що й кошик на головній сторінці — нової архітектури не вигадуємо.
function repeatOrder(order) {
  var raw = sessionStorage.getItem('marcelCart');
  var cart = [];
  try { cart = raw ? JSON.parse(raw) : []; } catch (e) { cart = []; }

  (order.order_items || []).forEach(function (item) {
    var id = item.product_id + '_' + item.weight;
    var existing = cart.find(function (c) { return c.id === id; });
    if (existing) {
      existing.qty = (existing.qty || 1) + (item.quantity || 1);
    } else {
      cart.push({
        id: id,
        name: item.product_name,
        weight: item.weight,
        price: item.unit_price,
        qty: item.quantity || 1,
        img: item.image_url || '',
      });
    }
  });

  sessionStorage.setItem('marcelCart', JSON.stringify(cart));
  window.location.href = '/checkout.html';
}

function handleGoogleCredential(response) {
  fetch('/api/auth/google', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ credential: response.credential }),
  })
    .then(function (r) { return r.json(); })
    .then(function () { return loadAccount(); })
    .catch(function () { showGate(); });
}

function initGoogle(clientId) {
  if (!window.google || !window.google.accounts || !window.google.accounts.id) return;
  window.google.accounts.id.initialize({ client_id: clientId, callback: handleGoogleCredential });
  window.google.accounts.id.renderButton(document.getElementById('googleBtn'), { theme: 'outline', size: 'large', text: 'signin_with' });
}

function waitForGoogle(clientId, attemptsLeft) {
  if (window.google && window.google.accounts && window.google.accounts.id) {
    initGoogle(clientId);
    return;
  }
  if (attemptsLeft <= 0) return;
  setTimeout(function () { waitForGoogle(clientId, attemptsLeft - 1); }, 200);
}

document.getElementById('logoutBtn').addEventListener('click', function () {
  fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' })
    .then(function () { window.location.reload(); });
});

function loadAccount() {
  fetch('/api/me', { credentials: 'same-origin' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (!d || !d.user) {
        showGate();
        fetch('/api/config').then(function (r) { return r.json(); }).then(function (cfg) {
          if (cfg && cfg.googleClientId) waitForGoogle(cfg.googleClientId, 25);
        });
        return;
      }
      currentUser = d.user;
      return fetch('/api/orders', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (od) { showAccount(d.user, od.orders || []); });
    })
    .catch(function () { showGate(); });
}

loadAccount();
</script>
</body>
</html>
